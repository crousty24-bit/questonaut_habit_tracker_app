<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 80" role="img" aria-labelledby="title desc">
  <title id="title">Questonaut wordmark</title>
  <desc id="desc">Questonaut wordmark in a bold condensed style.</desc>
  <defs>
    <linearGradient id="word" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#eef4ff"/>
      <stop offset="55%" stop-color="#c7dcff"/>
      <stop offset="100%" stop-color="#5bd2ff"/>
    </linearGradient>
  </defs>
  <text x="0" y="58" fill="url(#word)" font-size="56" font-family="Arial Black, Arial, sans-serif" letter-spacing="4">QUESTONAUT</text>
</svg>
