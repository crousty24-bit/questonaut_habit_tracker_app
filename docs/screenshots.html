<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Questonaut</title>
  <link rel="stylesheet" href="assets/css/main.css">
  <script defer src="assets/js/main.js"></script>
</head>
<body data-page="screenshots" data-title="Questonaut | Screenshots" data-description="A gallery of current Questonaut screens covering landing, login, dashboard, mission creation, and statistics." data-og-image="assets/img/og/questonaut-og.png">
  <div data-include="partials/header.html"></div>

  <main class="shell page-main">
    <section class="page-hero reveal">
      <p class="eyebrow">Screenshots</p>
      <h1>Product views captured from the current Questonaut experience.</h1>
      <p class="lede">
        This gallery highlights the current MVP surfaces used to present the product clearly on GitHub Pages,
        without depending on the Rails runtime.
      </p>
    </section>

    <section class="gallery">
      <figure class="gallery-card reveal">
        <img src="assets/img/screenshots/landing-page.png" alt="Questonaut landing page">
        <figcaption>
          <h2>Landing page</h2>
          <p>Introduces the space-themed positioning and directs visitors toward the core user flow.</p>
        </figcaption>
      </figure>

      <figure class="gallery-card reveal">
        <img src="assets/img/screenshots/login-signup.png" alt="Questonaut authentication screen">
        <figcaption>
          <h2>Login</h2>
          <p>The current mission-control login flow keeps authentication focused, readable, and aligned with the product theme.</p>
        </figcaption>
      </figure>

      <figure class="gallery-card reveal">
        <img src="assets/img/screenshots/dashboard.png" alt="Questonaut dashboard">
        <figcaption>
          <h2>Dashboard</h2>
          <p>The main hub for progress, mission management, quick validation, and streak visibility.</p>
        </figcaption>
      </figure>

      <figure class="gallery-card reveal">
        <img src="assets/img/screenshots/create-mission.png" alt="Questonaut create mission form">
        <figcaption>
          <h2>New mission modal</h2>
          <p>Mission creation now happens directly from the dashboard with a focused modal, category selection, and frequency choices.</p>
        </figcaption>
      </figure>

      <figure class="gallery-card reveal">
        <img src="assets/img/screenshots/statistics.png" alt="Questonaut statistics page">
        <figcaption>
          <h2>Mission report</h2>
          <p>Charts, badge collection, and mission analysis make the current progression loop easy to read at a glance.</p>
        </figcaption>
      </figure>
    </section>

    <section class="section">
      <div data-include="partials/cta.html"></div>
    </section>
  </main>

  <div data-include="partials/footer.html"></div>
</body>
</html>
